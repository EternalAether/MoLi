<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>晚安，好梦</title>
    <style>
        /* =========================================
           基础重置与全局变量配置
           ========================================= */
        :root {
            /* 核心色板：深蓝、靛青、柔和的紫、星光白 */
            --sky-top: #050714;
            --sky-mid: #121433;
            --sky-bottom: #2a224a;
            --moon-glow: rgba(255, 247, 214, 0.4);
            --text-main: #fcfcff;
            --text-sub: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止滚动，保持静谧的固定画面 */
            font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif; /* 优雅的衬线字体 */
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bottom) 100%);
            color: var(--text-main);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* =========================================
           背景元素与动画 (星空、月亮、山峦)
           ========================================= */
        /* Canvas星空层，置于最底层 */
        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 呼吸发光的月亮 */
        .moon {
            position: absolute;
            top: 15%;
            right: 20%;
            width: 80px;
            height: 80px;
            background: #fff7d6;
            border-radius: 50%;
            z-index: 2;
            /* 多层阴影叠加，打造柔和光晕 */
            box-shadow: 
                0 0 20px #fff7d6,
                0 0 60px var(--moon-glow),
                0 0 120px var(--moon-glow);
            animation: moonBreath 6s ease-in-out infinite alternate;
        }

        @keyframes moonBreath {
            0% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 20px #fff7d6, 0 0 50px var(--moon-glow); }
            100% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 30px #fff7d6, 0 0 80px var(--moon-glow), 0 0 150px var(--moon-glow); }
        }

        /* 底部远景山峦剪影 (使用SVG保持矢量清晰) */
        .mountains-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35vh;
            z-index: 3;
            pointer-events: none;
        }

        .mountains-container svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* =========================================
           前景文字内容
           ========================================= */
        .content-wrapper {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 600px;
            /* 缓慢的浮动动画增添轻盈感 */
            animation: floatUpDown 8s ease-in-out infinite;
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, calc(-50% - 15px)); }
        }

        .title {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 0.5rem;
            margin-bottom: 1.5rem;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            /* 入场动画 */
            opacity: 0;
            animation: fadeIn 3s ease-out 0.5s forwards;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: var(--text-sub);
            letter-spacing: 0.2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation: fadeIn 3s ease-out 1.5s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           交互动效 (点击星光涟漪)
           ========================================= */
        .ripple {
            position: absolute;
            border: 1px solid rgba(255, 247, 214, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 20;
            animation: rippleEffect 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes rippleEffect {
            0% { width: 0; height: 0; opacity: 0.8; }
            100% { width: 150px; height: 150px; opacity: 0; border-width: 0; }
        }

        /* =========================================
           响应式设计 (移动优先 -> 平板/桌面)
           ========================================= */
        /* 默认样式以移动端(手机)为主，下面调整平板和桌面端 */
        @media (max-width: 768px) {
            .moon {
                width: 60px;
                height: 60px;
                top: 10%;
                right: 15%;
            }
            .title {
                font-size: 3rem;
                letter-spacing: 0.3rem;
            }
            .subtitle {
                font-size: 1rem;
                letter-spacing: 0.1rem;
            }
            .mountains-container {
                height: 30vh;
            }
        }

        @media (min-width: 1200px) {
            .moon {
                width: 100px;
                height: 100px;
                right: 25%;
            }
            .title {
                font-size: 5rem;
            }
            .subtitle {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- 绘制动态星空的画布 -->
    <canvas id="starCanvas"></canvas>

    <!-- 呼吸发光的月亮 -->
    <div class="moon"></div>

    <!-- 核心文字内容 -->
    <div class="content-wrapper">
        <h1 class="title">晚安</h1>
        <p class="subtitle">愿星光伴你入眠，好梦</p>
    </div>

    <!-- 底部群山剪影 (纯SVG代码，无外部请求，优化性能) -->
    <div class="mountains-container">
        <svg viewBox="0 0 1200 300" preserveAspectRatio="none">
            <!-- 远景山脉 -->
            <path d="M0,300 L0,150 Q100,100 200,180 T500,120 T800,200 T1200,100 L1200,300 Z" fill="#14112e" opacity="0.6"/>
            <!-- 中景山脉 -->
            <path d="M0,300 L0,200 Q150,150 250,220 T600,180 T900,250 T1200,180 L1200,300 Z" fill="#0d0a20" opacity="0.8"/>
            <!-- 近景山脉/地面 -->
            <path d="M0,300 L0,250 Q200,200 400,260 T800,220 T1200,260 L1200,300 Z" fill="#05040d"/>
        </svg>
    </div>

    <script>
        /* =========================================
           星空 Canvas 渲染逻辑
           ========================================= */
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        // 初始化Canvas尺寸
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initStars();
        }

        // 星星对象构造
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.8; // 星星主要集中在天空上部(80%)
                this.size = Math.random() * 1.5 + 0.5; // 大小差异增加层次感
                this.baseAlpha = Math.random() * 0.5 + 0.3; // 基础透明度
                this.blinkSpeed = Math.random() * 0.02 + 0.005; // 闪烁速度
                this.alpha = this.baseAlpha;
                this.angle = Math.random() * Math.PI * 2;
            }

            draw() {
                // 利用正弦函数实现平滑的闪烁过渡
                this.alpha = this.baseAlpha + Math.sin(this.angle) * 0.3;
                this.angle += this.blinkSpeed;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fill();
            }
        }

        // 初始化星空群
        function initStars() {
            stars = [];
            // 根据屏幕宽度动态决定星星数量，保证移动端性能
            const starCount = Math.floor((width * height) / 4000); 
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => star.draw());
            requestAnimationFrame(animate);
        }

        // 监听窗口大小变化
        window.addEventListener('resize', resize);
        
        // 启动星空
        resize();
        animate();

        /* =========================================
           点击屏幕产生星光涟漪的交互逻辑
           ========================================= */
        document.body.addEventListener('click', function(e) {
            // 创建涟漪元素
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            // 设置点击位置
            ripple.style.left = `${e.clientX}px`;
            ripple.style.top = `${e.clientY}px`;
            
            document.body.appendChild(ripple);

            // 动画结束后移除DOM节点，避免内存泄漏
            setTimeout(() => {
                ripple.remove();
            }, 2500);
        });
    </script>
</body>
</html>
