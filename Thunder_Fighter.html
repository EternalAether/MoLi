<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Striker - WebGL/Canvas Procedural Shooter</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #fffb00;
            --bg-color: #050510;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; background-color: var(--bg-color); overflow: hidden; font-family: 'Courier New', Courier, monospace; color: white; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .hud-top { display: flex; justify-content: space-between; text-shadow: 0 0 5px var(--neon-blue); font-size: 1.2rem; font-weight: bold; }
        .score { color: var(--neon-blue); }
        .hp { color: var(--neon-pink); }
        #controls { pointer-events: auto; display: flex; justify-content: flex-end; }
        .btn { background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: 10px 15px; font-family: inherit; font-size: 1rem; cursor: pointer; border-radius: 5px; text-shadow: 0 0 5px var(--neon-blue); box-shadow: 0 0 10px rgba(0, 243, 255, 0.3) inset, 0 0 10px rgba(0, 243, 255, 0.3); outline: none; transition: 0.2s; }
        .btn:active { background: var(--neon-blue); color: #000; }
        #menus { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 16, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; backdrop-filter: blur(4px); z-index: 10; }
        #menus h1 { font-size: 3rem; margin-bottom: 20px; color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-pink); text-align: center; }
        #menus p { margin-bottom: 30px; font-size: 1.2rem; color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); text-align: center;}
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div class="score">SCORE: <span id="scoreVal">0</span></div>
            <div class="hp">HP: <span id="hpVal">100</span>%</div>
        </div>
        <div id="controls">
            <button id="muteBtn" class="btn">🔊 MUTE</button>
        </div>
    </div>

    <div id="menus">
        <h1 id="menuTitle">NEON STRIKER</h1>
        <p id="menuSubtitle">Touch & Drag to Move<br>Auto-Fire</p>
        <button id="startBtn" class="btn" style="font-size: 1.5rem; padding: 15px 40px;">START MISSION</button>
    </div>

<script>
/** =========================================================================
 *  AUDIO MANAGER (Web Audio API Synthesizer)
 *  ========================================================================= */
class AudioManager {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.muted = false;
        this.bgmOsc = null;
        this.bgmGain = null;
        this.bgmInterval = null;
    }

    init() { if (this.ctx.state === 'suspended') this.ctx.resume(); }
    toggleMute() { this.muted = !this.muted; return this.muted; }

    playTone(freq, type, duration, vol=0.1, slideFreq=null) {
        if (this.muted) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }

    playShoot() { this.playTone(800, 'square', 0.1, 0.05, 400); }
    playEnemyShoot() { this.playTone(600, 'sawtooth', 0.15, 0.03, 200); }
    playHit() { this.playTone(150, 'triangle', 0.1, 0.1, 50); }
    playPowerUp() {
        if (this.muted) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(800, now + 0.1);
        osc.frequency.linearRampToValueAtTime(1200, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.3);
    }
    
    playExplosion() {
        if (this.muted) return;
        const bufferSize = this.ctx.sampleRate * 0.5; // 0.5 seconds
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1000, this.ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.4);
        
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
        
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
    }

    startBGM() {
        if (this.bgmInterval) clearInterval(this.bgmInterval);
        let noteIdx = 0;
        const notes = [65.41, 65.41, 98.00, 73.42]; // C2, C2, G2, D2
        this.bgmInterval = setInterval(() => {
            if (!this.muted) {
                this.playTone(notes[noteIdx % notes.length], 'square', 0.2, 0.02, notes[noteIdx % notes.length] * 0.9);
            }
            noteIdx++;
        }, 250);
    }
    stopBGM() { if (this.bgmInterval) clearInterval(this.bgmInterval); }
}

const audio = new AudioManager();

/** =========================================================================
 *  CORE ENGINE & UTILS
 *  ========================================================================= */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let width, height;

function resize() {
    const dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize);
resize();

const Utils = {
    rand: (min, max) => Math.random() * (max - min) + min,
    dist: (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y),
    rectIntersect: (r1, r2) => !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y),
    circleIntersect: (c1, c2) => Utils.dist(c1, c2) < c1.r + c2.r
};

/** =========================================================================
 *  GAME ENTITIES
 *  ========================================================================= */
class Particle {
    constructor(x, y, color, speed, size, life) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * speed;
        this.vy = (Math.random() - 0.5) * speed;
        this.color = color;
        this.size = size;
        this.life = life;
        this.maxLife = life;
    }
    update(dt) {
        this.x += this.vx * dt * 60;
        this.y += this.vy * dt * 60;
        this.life -= dt;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

class Bullet {
    constructor(x, y, vx, vy, color, isEnemy, dmg) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.color = color;
        this.isEnemy = isEnemy;
        this.dmg = dmg;
        this.r = 3;
        this.active = true;
    }
    update(dt) {
        this.x += this.vx * dt * 60;
        this.y += this.vy * dt * 60;
        if (this.y < -10 || this.y > height + 10 || this.x < -10 || this.x > width + 10) this.active = false;
    }
    draw(ctx) {
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class Ship {
    constructor(x, y, hp, color) {
        this.x = x; this.y = y;
        this.hp = hp;
        this.maxHp = hp;
        this.color = color;
        this.active = true;
        this.r = 15;
    }
    takeDamage(amt) {
        this.hp -= amt;
        if (this.hp <= 0) {
            this.hp = 0;
            this.active = false;
            this.explode();
        } else {
            audio.playHit();
        }
    }
    explode() {
        audio.playExplosion();
        for(let i=0; i<30; i++) {
            game.particles.push(new Particle(this.x, this.y, this.color, 10, Utils.rand(2,5), Utils.rand(0.5, 1.2)));
            game.particles.push(new Particle(this.x, this.y, '#fff', 15, Utils.rand(1,3), Utils.rand(0.2, 0.5)));
        }
    }
}

class Player extends Ship {
    constructor(x, y) {
        super(x, y, 100, '#00f3ff');
        this.targetX = x;
        this.targetY = y;
        this.fireRate = 0.15;
        this.fireTimer = 0;
        this.weaponLevel = 1;
    }
    update(dt) {
        // Smooth movement
        this.x += (this.targetX - this.x) * 10 * dt;
        this.y += (this.targetY - this.y) * 10 * dt;
        
        // Boundaries
        this.x = Math.max(this.r, Math.min(width - this.r, this.x));
        this.y = Math.max(this.r, Math.min(height - this.r, this.y));

        // Engine trail
        if (Math.random() < 0.5) {
            game.particles.push(new Particle(this.x + Utils.rand(-5, 5), this.y + 10, '#00f3ff', 2, 2, 0.3));
        }

        // Auto Fire
        this.fireTimer -= dt;
        if (this.fireTimer <= 0) {
            this.fireTimer = this.fireRate;
            audio.playShoot();
            if (this.weaponLevel === 1) {
                game.bullets.push(new Bullet(this.x, this.y - 15, 0, -12, this.color, false, 10));
            } else if (this.weaponLevel === 2) {
                game.bullets.push(new Bullet(this.x - 8, this.y - 10, 0, -12, this.color, false, 10));
                game.bullets.push(new Bullet(this.x + 8, this.y - 10, 0, -12, this.color, false, 10));
            } else {
                game.bullets.push(new Bullet(this.x, this.y - 15, 0, -12, this.color, false, 10));
                game.bullets.push(new Bullet(this.x - 10, this.y - 10, -2, -11, this.color, false, 8));
                game.bullets.push(new Bullet(this.x + 10, this.y - 10, 2, -11, this.color, false, 8));
            }
        }
    }
    draw(ctx) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.fillStyle = '#050510';
        
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - 15);
        ctx.lineTo(this.x + 15, this.y + 15);
        ctx.lineTo(this.x, this.y + 5);
        ctx.lineTo(this.x - 15, this.y + 15);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        
        // Core
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class Enemy extends Ship {
    constructor(x, y, type) {
        let hp = 20, color = '#ff00ff';
        super(x, y, hp, color);
        this.type = type; // 0: basic, 1: fast, 2: tank
        this.time = 0;
        
        if (type === 1) { this.hp = 10; this.color = '#fffb00'; this.r = 10; }
        if (type === 2) { this.hp = 80; this.color = '#ff3333'; this.r = 25; }
        this.maxHp = this.hp;
        this.fireTimer = Utils.rand(1, 3);
    }
    update(dt) {
        this.time += dt;
        let speedY = this.type === 1 ? 5 : (this.type === 2 ? 1.5 : 3);
        this.y += speedY * dt * 60;
        
        if (this.type === 0) this.x += Math.sin(this.time * 2) * 2;
        if (this.type === 1) this.x += Math.cos(this.time * 4) * 3;
        
        if (this.y > height + 30) this.active = false;

        // Shoot
        this.fireTimer -= dt;
        if (this.fireTimer <= 0 && this.type !== 1) {
            this.fireTimer = this.type === 2 ? 1.5 : 2;
            audio.playEnemyShoot();
            game.bullets.push(new Bullet(this.x, this.y + this.r, 0, 6, this.color, true, 10));
            if (this.type === 2) {
                game.bullets.push(new Bullet(this.x, this.y + this.r, -3, 5, this.color, true, 10));
                game.bullets.push(new Bullet(this.x, this.y + this.r, 3, 5, this.color, true, 10));
            }
        }
    }
    draw(ctx) {
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.fillStyle = '#050510';
        
        ctx.beginPath();
        if (this.type === 0) {
            ctx.moveTo(this.x - 15, this.y - 10);
            ctx.lineTo(this.x + 15, this.y - 10);
            ctx.lineTo(this.x, this.y + 15);
        } else if (this.type === 1) {
            ctx.moveTo(this.x, this.y + 15);
            ctx.lineTo(this.x + 10, this.y - 5);
            ctx.lineTo(this.x - 10, this.y - 5);
        } else if (this.type === 2) {
            ctx.rect(this.x - 20, this.y - 20, 40, 40);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;

        // HP Bar for tank
        if (this.type === 2 && this.hp < this.maxHp) {
            ctx.fillStyle = 'red';
            ctx.fillRect(this.x - 20, this.y - 30, 40, 4);
            ctx.fillStyle = '#0f0';
            ctx.fillRect(this.x - 20, this.y - 30, 40 * (this.hp/this.maxHp), 4);
        }
    }
}

class PowerUp {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.r = 12;
        this.color = '#00ff00';
        this.active = true;
        this.time = 0;
    }
    update(dt) {
        this.time += dt;
        this.y += 2 * dt * 60;
        if (this.y > height + 20) this.active = false;
    }
    draw(ctx) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r + Math.sin(this.time*10)*2, 0, Math.PI*2);
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = '12px Courier';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('P', this.x, this.y);
        ctx.shadowBlur = 0;
    }
}

class Star {
    constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.z = Math.random() * 2 + 0.1;
        this.alpha = Math.random();
    }
    update(dt) {
        this.y += this.z * 50 * dt;
        if (this.y > height) {
            this.y = 0;
            this.x = Math.random() * width;
        }
    }
    draw(ctx) {
        ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
        ctx.fillRect(this.x, this.y, this.z, this.z * 2);
    }
}

/** =========================================================================
 *  GAME LOOP & LOGIC
 *  ========================================================================= */
const game = {
    state: 'menu', // menu, playing, gameover
    lastTime: 0,
    score: 0,
    difficulty: 1,
    spawnTimer: 0,
    
    player: null,
    enemies: [],
    bullets: [],
    particles: [],
    powerups: [],
    stars: [],

    init() {
        for(let i=0; i<100; i++) this.stars.push(new Star());
        this.bindEvents();
        requestAnimationFrame(t => this.loop(t));
    },

    start() {
        audio.init();
        audio.startBGM();
        this.player = new Player(width / 2, height - 100);
        this.enemies = [];
        this.bullets = [];
        this.particles = [];
        this.powerups = [];
        this.score = 0;
        this.difficulty = 1;
        this.state = 'playing';
        
        document.getElementById('menus').classList.add('hidden');
        this.updateUI();
    },

    gameOver() {
        this.state = 'gameover';
        audio.stopBGM();
        document.getElementById('menus').classList.remove('hidden');
        document.getElementById('menuTitle').innerText = 'MISSION FAILED';
        document.getElementById('menuSubtitle').innerText = `FINAL SCORE: ${this.score}`;
        document.getElementById('startBtn').innerText = 'RESTART';
    },

    bindEvents() {
        const setPlayerTarget = (e) => {
            if (this.state !== 'playing' || !this.player) return;
            let cx = e.clientX || (e.touches && e.touches[0].clientX);
            let cy = e.clientY || (e.touches && e.touches[0].clientY);
            if (cx !== undefined) {
                // Offset finger slightly above the ship so it's not hidden
                this.player.targetX = cx;
                this.player.targetY = cy - 40; 
            }
        };

        canvas.addEventListener('touchmove', setPlayerTarget, {passive: false});
        canvas.addEventListener('touchstart', setPlayerTarget, {passive: false});
        canvas.addEventListener('mousemove', setPlayerTarget);

        document.getElementById('startBtn').addEventListener('click', () => this.start());
        
        const muteBtn = document.getElementById('muteBtn');
        muteBtn.addEventListener('click', () => {
            const isMuted = audio.toggleMute();
            muteBtn.innerText = isMuted ? '🔇 MUTED' : '🔊 MUTE';
            if(isMuted) audio.stopBGM(); else if(this.state === 'playing') audio.startBGM();
        });
    },

    spawnEnemy() {
        let x = Utils.rand(30, width - 30);
        let rand = Math.random();
        let type = 0;
        if (rand < 0.2 * this.difficulty) type = 1; // Fast
        if (rand > 0.9 - (this.difficulty * 0.05)) type = 2; // Tank
        
        this.enemies.push(new Enemy(x, -30, type));
    },

    update(dt) {
        if (this.state !== 'playing') {
            this.stars.forEach(s => s.update(dt * 0.2));
            return;
        }

        // Difficulty scaling
        this.difficulty += dt * 0.01;
        this.spawnTimer -= dt;
        if (this.spawnTimer <= 0) {
            this.spawnEnemy();
            this.spawnTimer = Math.max(0.3, 2.0 - (this.difficulty * 0.2));
        }

        this.stars.forEach(s => s.update(dt));
        if (this.player) this.player.update(dt);

        this.bullets.forEach(b => b.update(dt));
        this.enemies.forEach(e => e.update(dt));
        this.particles.forEach(p => p.update(dt));
        this.powerups.forEach(p => p.update(dt));

        // Collisions
        for (let i = this.enemies.length - 1; i >= 0; i--) {
            let e = this.enemies[i];
            
            // Player vs Enemy
            if (this.player && Utils.circleIntersect(this.player, e)) {
                e.takeDamage(100);
                this.player.takeDamage(20);
                this.updateUI();
            }

            // Bullet vs Enemy
            for (let j = this.bullets.length - 1; j >= 0; j--) {
                let b = this.bullets[j];
                if (!b.isEnemy && b.active && Utils.circleIntersect(b, e)) {
                    b.active = false;
                    e.takeDamage(b.dmg);
                    
                    // Sparkles
                    for(let k=0; k<3; k++) this.particles.push(new Particle(b.x, b.y, e.color, 5, 2, 0.2));

                    if (!e.active) {
                        this.score += (e.type === 2 ? 500 : (e.type === 1 ? 200 : 100));
                        this.updateUI();
                        // Drop powerup chance
                        if (Math.random() < 0.1) this.powerups.push(new PowerUp(e.x, e.y));
                    }
                }
            }
        }

        // Enemy Bullet vs Player
        if (this.player && this.player.active) {
            for (let i = 0; i < this.bullets.length; i++) {
                let b = this.bullets[i];
                if (b.isEnemy && b.active && Utils.circleIntersect(b, this.player)) {
                    b.active = false;
                    this.player.takeDamage(b.dmg);
                    this.updateUI();
                }
            }
            
            // Player vs Powerup
            for (let i = 0; i < this.powerups.length; i++) {
                let p = this.powerups[i];
                if (p.active && Utils.circleIntersect(p, this.player)) {
                    p.active = false;
                    audio.playPowerUp();
                    if (this.player.weaponLevel < 3) this.player.weaponLevel++;
                    this.score += 300;
                    this.updateUI();
                }
            }
        }

        // Cleanup
        this.bullets = this.bullets.filter(b => b.active);
        this.enemies = this.enemies.filter(e => e.active);
        this.particles = this.particles.filter(p => p.life > 0);
        this.powerups = this.powerups.filter(p => p.active);

        if (this.player && !this.player.active) {
            this.player = null;
            setTimeout(() => this.gameOver(), 1500);
        }
    },

    draw() {
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, width, height);

        // Grid Background
        ctx.strokeStyle = 'rgba(0, 243, 255, 0.05)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        let offset = (Date.now() / 20) % 50;
        for(let i=0; i<width; i+=50) { ctx.moveTo(i, 0); ctx.lineTo(i, height); }
        for(let i=0; i<height; i+=50) { ctx.moveTo(0, i + offset); ctx.lineTo(width, i + offset); }
        ctx.stroke();

        this.stars.forEach(s => s.draw(ctx));
        this.particles.forEach(p => p.draw(ctx));
        this.powerups.forEach(p => p.draw(ctx));
        this.bullets.forEach(b => b.draw(ctx));
        this.enemies.forEach(e => e.draw(ctx));
        if (this.player) this.player.draw(ctx);
    },

    updateUI() {
        document.getElementById('scoreVal').innerText = this.score;
        document.getElementById('hpVal').innerText = this.player ? this.player.hp : 0;
    },

    loop(timestamp) {
        let dt = (timestamp - this.lastTime) / 1000;
        if (dt > 0.1) dt = 0.1; // Cap dt on tab switch
        this.lastTime = timestamp;

        this.update(dt);
        this.draw();

        requestAnimationFrame(t => this.loop(t));
    }
};

// Start Engine
window.onload = () => game.init();

</script>
</body>
