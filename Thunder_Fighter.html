<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雷霆战机 - 赛博朋克</title>
<style>
    :root {
        --neon-blue: #0ff;
        --neon-pink: #f0f;
        --neon-yellow: #ff0;
        --dark-bg: #050510;
    }
    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: var(--dark-bg); color: #fff;
        font-family: 'Courier New', Courier, monospace;
        overflow: hidden; touch-action: none; user-select: none;
    }
    #gameCanvas {
        display: block; width: 100%; height: 100%;
    }
    .hud {
        position: absolute; top: 15px; left: 15px; z-index: 10;
        text-shadow: 0 0 5px var(--neon-blue); font-size: 18px; pointer-events: none;
    }
    .btn {
        position: absolute; z-index: 20; background: rgba(0, 20, 40, 0.6);
        border: 2px solid var(--neon-blue); color: var(--neon-blue);
        padding: 10px 15px; cursor: pointer; font-family: inherit;
        font-weight: bold; text-shadow: 0 0 5px var(--neon-blue);
        box-shadow: 0 0 10px var(--neon-blue) inset; border-radius: 5px;
        transition: 0.2s;
    }
    .btn:hover { background: var(--neon-blue); color: #000; }
    #pauseBtn { bottom: 20px; left: 20px; }
    #muteBtn { bottom: 20px; right: 20px; }
    
    #pauseMenu, #gameOverMenu {
        display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8); z-index: 30; flex-direction: column;
        justify-content: center; align-items: center; text-align: center;
    }
    h1 {
        font-size: 40px; color: var(--neon-pink);
        text-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-pink);
        margin-bottom: 30px; letter-spacing: 5px;
    }
    .menu-btn {
        margin: 10px; width: 200px; font-size: 20px; padding: 15px;
        border-color: var(--neon-pink); color: var(--neon-pink);
        box-shadow: 0 0 10px var(--neon-pink) inset;
    }
    .menu-btn:hover { background: var(--neon-pink); color: #000; }

    #warningScreen {
        display: none; position: absolute; top: 30%; width: 100%; text-align: center;
        color: #f00; font-size: 60px; font-weight: bold; z-index: 15;
        text-shadow: 0 0 20px #f00, 0 0 40px #f00; pointer-events: none;
        animation: flash 0.5s infinite alternate;
    }
    @keyframes flash { from { opacity: 0.2; } to { opacity: 1; } }

    #bossUI {
        display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
        width: 60%; z-index: 10;
    }
    #bossName {
        text-align: center; color: #f00; text-shadow: 0 0 5px #f00; font-weight: bold; margin-bottom: 5px;
    }
    .health-bar-bg {
        width: 100%; height: 15px; background: #222; border: 2px solid #f00;
        box-shadow: 0 0 10px #f00;
    }
    .health-bar-fill {
        width: 100%; height: 100%; background: #f00; transition: width 0.1s;
    }
</style>
</head>
<body>

<div class="hud" id="hud">
    <div>分数: <span id="scoreVal">0</span></div>
    <div>难度等级: <span id="levelVal">1</span></div>
    <div>生命值: <span id="hpVal">100</span>%</div>
    <div style="color:var(--neon-yellow); margin-top:5px;">火力等级: <span id="powerVal">1</span></div>
</div>

<button class="btn" id="pauseBtn">暂停</button>
<button class="btn" id="muteBtn">音效: 开</button>

<div id="pauseMenu">
    <h1>游戏暂停</h1>
    <button class="btn menu-btn" id="resumeBtn">继续游戏</button>
    <button class="btn menu-btn" id="restartBtnPause">重新开始</button>
</div>

<div id="gameOverMenu">
    <h1>连接中断</h1>
    <div style="font-size:24px; margin-bottom:20px; color:var(--neon-blue);">最终分数: <span id="finalScore">0</span></div>
    <button class="btn menu-btn" id="restartBtn">重新启动</button>
</div>

<div id="warningScreen">警告！高能反应接近！</div>

<div id="bossUI">
    <div id="bossName">BOSS 01 - 湮灭者</div>
    <div class="health-bar-bg"><div class="health-bar-fill" id="bossHpFill"></div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// ==========================================
// 核心引擎与音频系统
// ==========================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
});

// Web Audio API
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let isMuted = false;

function playSound(type) {
    if (isMuted || audioCtx.state !== 'running') return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    if (type === 'shoot') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        gainNode.gain.setValueAtTime(0.05, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'explode') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(10, now + 0.3);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'powerup') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(800, now + 0.1);
        osc.frequency.linearRampToValueAtTime(1200, now + 0.2);
        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'warning') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.setValueAtTime(400, now + 0.25);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
    }
}

// ==========================================
// 游戏状态与输入
// ==========================================
let gameState = 'playing'; // playing, paused, gameover
let score = 0;
let difficultyLevel = 1;
let bossMode = false;
let bossIndex = 0;
const keys = {};
const mouse = { x: W/2, y: H/2, isDown: false };

window.addEventListener('keydown', e => { 
    keys[e.key.toLowerCase()] = true; 
    if(e.code === 'Space') keys['space'] = true;
});
window.addEventListener('keyup', e => { 
    keys[e.key.toLowerCase()] = false; 
    if(e.code === 'Space') keys['space'] = false;
});
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', () => { mouse.isDown = true; if(audioCtx.state==='suspended') audioCtx.resume(); });
window.addEventListener('mouseup', () => { mouse.isDown = false; });
window.addEventListener('touchstart', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.isDown = true; if(audioCtx.state==='suspended') audioCtx.resume(); });
window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
window.addEventListener('touchend', () => { mouse.isDown = false; });

// UI 绑定
document.getElementById('pauseBtn').onclick = () => {
    if (gameState === 'playing') { gameState = 'paused'; document.getElementById('pauseMenu').style.display = 'flex'; }
};
document.getElementById('resumeBtn').onclick = () => {
    gameState = 'playing'; document.getElementById('pauseMenu').style.display = 'none';
};
const restartGame = () => {
    initGame(); gameState = 'playing';
    document.getElementById('pauseMenu').style.display = 'none';
    document.getElementById('gameOverMenu').style.display = 'none';
    document.getElementById('bossUI').style.display = 'none';
    document.getElementById('warningScreen').style.display = 'none';
};
document.getElementById('restartBtnPause').onclick = restartGame;
document.getElementById('restartBtn').onclick = restartGame;
document.getElementById('muteBtn').onclick = (e) => {
    isMuted = !isMuted;
    e.target.innerText = `音效: ${isMuted ? '关' : '开'}`;
};

// ==========================================
// 对象池与基础类
// ==========================================
class Pool {
    constructor(factory, size) {
        this.items = Array.from({length: size}, factory);
    }
    get() {
        for(let i=0; i<this.items.length; i++) {
            if(!this.items[i].active) {
                this.items[i].active = true;
                return this.items[i];
            }
        }
        return null;
    }
}

// 粒子特效
class Particle {
    constructor() { this.active = false; }
    spawn(x, y, vx, vy, color, life, size) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.color = color; this.life = life; this.maxLife = life;
        this.size = size; this.active = true;
    }
    update(dt) {
        if(!this.active) return;
        this.x += this.vx * dt; this.y += this.vy * dt;
        this.life -= dt;
        if(this.life <= 0) this.active = false;
    }
    draw(ctx) {
        if(!this.active) return;
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    }
}
const particlePool = new Pool(() => new Particle(), 500);

function createExplosion(x, y, color, count) {
    playSound('explode');
    for(let i=0; i<count; i++) {
        const p = particlePool.get();
        if(p) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 150 + 50;
            p.spawn(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed, color, Math.random()*0.5+0.2, Math.random()*3+1);
        }
    }
}

// 子弹
class Bullet {
    constructor() { this.active = false; }
    spawn(x, y, vx, vy, color, isPlayer, dmg) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.color = color; this.isPlayer = isPlayer; this.dmg = dmg;
        this.radius = isPlayer ? 3 : 4;
        this.active = true;
    }
    update(dt) {
        if(!this.active) return;
        this.x += this.vx * dt; this.y += this.vy * dt;
        if(this.y < -50 || this.y > H + 50 || this.x < -50 || this.x > W + 50) this.active = false;
    }
    draw(ctx) {
        if(!this.active) return;
        ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}
const bulletPool = new Pool(() => new Bullet(), 1000);

// ==========================================
// 玩家类
// ==========================================
class Player {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = W / 2; this.y = H - 100;
        this.hp = 100; this.power = 1; this.speed = 350;
        this.shootCooldown = 0; this.radius = 12;
    }
    update(dt) {
        // 移动
        let dx = 0, dy = 0;
        if(keys['a'] || keys['arrowleft']) dx -= 1;
        if(keys['d'] || keys['arrowright']) dx += 1;
        if(keys['w'] || keys['arrowup']) dy -= 1;
        if(keys['s'] || keys['arrowdown']) dy += 1;
        
        if(dx !== 0 || dy !== 0) {
            const len = Math.hypot(dx, dy);
            this.x += (dx/len) * this.speed * dt;
            this.y += (dy/len) * this.speed * dt;
        } else if (mouse.isDown) {
            this.x += (mouse.x - this.x) * 10 * dt;
            this.y += (mouse.y - this.y) * 10 * dt;
        }
        
        // 边界限制
        this.x = Math.max(this.radius, Math.min(W - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(H - this.radius, this.y));

        // 引擎粒子
        if(Math.random() < 0.5) {
            const p = particlePool.get();
            if(p) p.spawn(this.x + (Math.random()-0.5)*10, this.y + 15, 0, 150, '#0ff', 0.2, 2);
        }

        // 射击
        this.shootCooldown -= dt;
        if(this.shootCooldown <= 0 && (keys['space'] || mouse.isDown || bossMode)) {
            this.shoot();
        }
    }
    shoot() {
        playSound('shoot');
        this.shootCooldown = Math.max(0.08, 0.2 - this.power * 0.015);
        const bSpeed = -600;
        if(this.power === 1) {
            let b = bulletPool.get(); if(b) b.spawn(this.x, this.y - 15, 0, bSpeed, '#0ff', true, 10);
        } else if(this.power === 2) {
            let b1 = bulletPool.get(); if(b1) b1.spawn(this.x - 8, this.y - 10, 0, bSpeed, '#0ff', true, 10);
            let b2 = bulletPool.get(); if(b2) b2.spawn(this.x + 8, this.y - 10, 0, bSpeed, '#0ff', true, 10);
        } else {
            let num = Math.min(5, 2 + Math.floor(this.power/2));
            for(let i=0; i<num; i++) {
                let angle = (i - (num-1)/2) * 0.1;
                let b = bulletPool.get();
                if(b) b.spawn(this.x, this.y - 15, Math.sin(angle)*bSpeed*-1, Math.cos(angle)*bSpeed, '#0ff', true, 10 + this.power);
            }
        }
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
        
        // 战机机身
        ctx.fillStyle = '#113';
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, -20); ctx.lineTo(15, 10); ctx.lineTo(0, 5); ctx.lineTo(-15, 10);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        
        // 核心发光
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(0, -5, 3, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}
const player = new Player();

// ==========================================
// 敌机与道具
// ==========================================
class Item {
    constructor() { this.active = false; }
    spawn(x, y) {
        this.x = x; this.y = y; this.active = true; this.radius = 10; this.vy = 100;
    }
    update(dt) {
        if(!this.active) return;
        this.y += this.vy * dt;
        
        // 吸引效果
        const dist = Math.hypot(player.x - this.x, player.y - this.y);
        if(dist < 150) {
            this.x += (player.x - this.x) * 3 * dt;
            this.y += (player.y - this.y) * 3 * dt;
        }

        if(dist < player.radius + this.radius) {
            this.active = false;
            player.power++;
            player.hp = Math.min(100, player.hp + 10);
            playSound('powerup');
            updateHUD();
        }
        if(this.y > H + 20) this.active = false;
    }
    draw(ctx) {
        if(!this.active) return;
        ctx.shadowBlur = 15; ctx.shadowColor = '#ff0';
        ctx.fillStyle = '#ff0';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; ctx.fillText('P', this.x-4, this.y+4);
        ctx.shadowBlur = 0;
    }
}
const itemPool = new Pool(() => new Item(), 20);

class Enemy {
    constructor() { this.active = false; }
    spawn(type, x, y, hpMulti) {
        this.type = type; this.x = x; this.y = y; this.active = true;
        this.time = 0; this.shootTimer = Math.random();
        
        // 类型定义
        // 0: A-巡航, 1: A-S形, 2: C-补给, 3: B-炮台, 4: 追踪, 5: 密集阵
        this.radius = type === 2 ? 18 : 15;
        this.hp = [20, 30, 80, 60, 40, 70][type] * hpMulti;
        this.maxHp = this.hp;
        this.color = ['#f0f', '#0f0', '#ff0', '#f00', '#f80', '#b0f'][type];
        this.vx = 0; this.vy = [150, 100, 50, 80, 180, 60][type];
    }
    update(dt) {
        if(!this.active) return;
        this.time += dt;
        
        if(this.type === 1) this.vx = Math.sin(this.time * 3) * 100;
        else if(this.type === 2 || this.type === 3 || this.type === 5) {
            if(this.y > 100) this.vy = 0; // 悬停
            this.vx = Math.sin(this.time) * 50;
        } else if(this.type === 4) {
            if(player.x < this.x) this.vx = -50; else this.vx = 50;
        }
        
        this.x += this.vx * dt; this.y += this.vy * dt;

        // 射击
        this.shootTimer -= dt;
        if(this.shootTimer <= 0) {
            const bSpeed = 250 + difficultyLevel * 20;
            if(this.type === 3 && this.y > 50) { // 炮台
                this.shootTimer = 1.0;
                for(let i=0; i<3; i++) {
                    let angle = (i-1)*0.2 + Math.PI/2;
                    let b = bulletPool.get(); if(b) b.spawn(this.x, this.y, Math.cos(angle)*bSpeed, Math.sin(angle)*bSpeed, '#f00', false, 10);
                }
            } else if(this.type === 5 && this.y > 50) { // 密集
                this.shootTimer = 0.5;
                for(let i=0; i<8; i++) {
                    let angle = (i/8)*Math.PI*2 + this.time;
                    let b = bulletPool.get(); if(b) b.spawn(this.x, this.y, Math.cos(angle)*bSpeed*0.6, Math.sin(angle)*bSpeed*0.6, '#f0f', false, 10);
                }
            } else if(this.type === 2) {
                this.shootTimer = 1.5;
                let b = bulletPool.get(); if(b) b.spawn(this.x, this.y, 0, bSpeed, '#ff0', false, 10);
            } else if(this.type === 0 || this.type === 1 || this.type === 4) {
                this.shootTimer = 2.0;
                let b = bulletPool.get(); if(b) b.spawn(this.x, this.y, 0, bSpeed, this.color, false, 10);
            }
        }

        if(this.y > H + 50) this.active = false;
    }
    takeDamage(amt) {
        this.hp -= amt;
        playSound('hit');
        if(this.hp <= 0) {
            this.active = false;
            score += (this.type + 1) * 100;
            createExplosion(this.x, this.y, this.color, 15);
            if(this.type === 2 || Math.random() < 0.05) { // 补给掉落
                let item = itemPool.get(); if(item) item.spawn(this.x, this.y);
            }
            checkDifficulty();
        }
    }
    draw(ctx) {
        if(!this.active) return;
        ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color; ctx.lineWidth = 2;
        ctx.fillStyle = '#000';
        
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.beginPath();
        if(this.type === 2) { // Hexagon
            for(let i=0; i<6; i++) {
                ctx.lineTo(Math.cos(i*Math.PI/3)*this.radius, Math.sin(i*Math.PI/3)*this.radius);
            }
        } else if(this.type === 3 || this.type === 5) {
            ctx.rect(-this.radius, -this.radius, this.radius*2, this.radius*2);
        } else {
            ctx.moveTo(0, this.radius); ctx.lineTo(-this.radius, -this.radius); ctx.lineTo(this.radius, -this.radius);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        
        // 血条
        if(this.hp < this.maxHp) {
            ctx.fillStyle = '#f00'; ctx.fillRect(-10, -this.radius-8, 20, 3);
            ctx.fillStyle = '#0f0'; ctx.fillRect(-10, -this.radius-8, 20 * (this.hp/this.maxHp), 3);
        }
        ctx.restore();
    }
}
const enemyPool = new Pool(() => new Enemy(), 50);

// ==========================================
// BOSS 系统
// ==========================================
class Boss {
    constructor() { this.active = false; }
    spawn(idx) {
        this.active = true; this.idx = idx % 5;
        this.x = W/2; this.y = -100;
        this.maxHp = 2000 + idx * 1000; this.hp = this.maxHp;
        this.state = 'enter'; this.time = 0;
        document.getElementById('bossUI').style.display = 'block';
        document.getElementById('bossName').innerText = `BOSS 0${this.idx + 1} - 毁灭核心`;
        this.updateHPBar();
    }
    updateHPBar() {
        document.getElementById('bossHpFill').style.width = `${(this.hp/this.maxHp)*100}%`;
    }
    update(dt) {
        if(!this.active) return;
        this.time += dt;
        
        if(this.state === 'enter') {
            this.y += 50 * dt;
            if(this.y >= 120) { this.state = 'attack'; this.time = 0; }
        } else if(this.state === 'attack') {
            this.x = W/2 + Math.sin(this.time) * (W/3); // 左右浮动
            
            // 攻击模式
            const bSpeed = 300;
            if(this.idx === 0) { // 放射
                if(this.time % 2 < 0.1) {
                    for(let i=0; i<12; i++) {
                        let a = (i/12)*Math.PI*2 + this.time;
                        let b = bulletPool.get(); if(b) b.spawn(this.x, this.y, Math.cos(a)*bSpeed, Math.sin(a)*bSpeed, '#f00', false, 15);
                    }
                }
            } else if(this.idx === 1) { // 螺旋
                if(this.time % 0.2 < 0.1) {
                    let a = this.time * 5;
                    let b = bulletPool.get(); if(b) b.spawn(this.x, this.y, Math.cos(a)*bSpeed, Math.sin(a)*bSpeed, '#f0f', false, 15);
                    let b2 = bulletPool.get(); if(b2) b2.spawn(this.x, this.y, Math.cos(a+Math.PI)*bSpeed, Math.sin(a+Math.PI)*bSpeed, '#f0f', false, 15);
                }
            } else { // 混合
                if(this.time % 1.5 < 0.1) {
                    let angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);
                    for(let i=-2; i<=2; i++) {
                        let b = bulletPool.get(); if(b) b.spawn(this.x, this.y, Math.cos(angleToPlayer+i*0.2)*400, Math.sin(angleToPlayer+i*0.2)*400, '#ff0', false, 20);
                    }
                }
                if(this.time % 0.5 < 0.1) {
                     let a = this.time * 3;
                     let b = bulletPool.get(); if(b) b.spawn(this.x, this.y, Math.cos(a)*200, Math.sin(a)*200, '#f00', false, 10);
                }
            }
        }
    }
    takeDamage(amt) {
        if(this.state === 'enter') return;
        this.hp -= amt;
        playSound('hit');
        this.updateHPBar();
        if(this.hp <= 0) {
            this.active = false;
            createExplosion(this.x, this.y, '#f00', 100);
            score += 5000;
            bossMode = false; bossIndex++;
            document.getElementById('bossUI').style.display = 'none';
            for(let i=0; i<5; i++) { let it = itemPool.get(); if(it) it.spawn(this.x + (i-2)*20, this.y); }
            checkDifficulty();
        }
    }
    draw(ctx) {
        if(!this.active) return;
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.shadowBlur = 20; ctx.shadowColor = '#f00';
        ctx.fillStyle = '#200'; ctx.strokeStyle = '#f00'; ctx.lineWidth = 3;
        
        ctx.beginPath();
        ctx.arc(0, 0, 40, 0, Math.PI*2);
        ctx.moveTo(-60, -20); ctx.lineTo(60, -20); ctx.lineTo(0, 60); ctx.closePath();
        ctx.fill(); ctx.stroke();
        
        // 核心动画
        ctx.fillStyle = '#f00';
        ctx.globalAlpha = 0.5 + Math.sin(this.time*10)*0.5;
        ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}
const boss = new Boss();

// ==========================================
// 游戏流程与生成逻辑
// ==========================================
let spawnTimer = 0;
function spawnEnemies(dt) {
    if(bossMode) return;
    spawnTimer -= dt;
    if(spawnTimer <= 0) {
        spawnTimer = Math.max(0.5, 2.0 - difficultyLevel * 0.15);
        let maxEnemies = Math.min(10, 3 + Math.floor(difficultyLevel/2));
        let activeCount = enemyPool.items.filter(e => e.active).length;
        
        if(activeCount < maxEnemies) {
            let type = Math.floor(Math.random() * 6);
            // 确保每波有补给型
            if(Math.random() < 0.15) type = 2; 
            
            // 清场原则：如果有悬停敌人(2,3,5)存在，暂不生成新的悬停
            if([2,3,5].includes(type) && enemyPool.items.some(e => e.active && [2,3,5].includes(e.type))) {
                type = Math.random() < 0.5 ? 0 : 1;
            }

            let e = enemyPool.get();
            if(e) e.spawn(type, Math.random()*(W-60)+30, -30, 1 + difficultyLevel*0.2);
        }
    }
}

function checkDifficulty() {
    let newLevel = Math.floor(score / 1000) + 1;
    if(newLevel > difficultyLevel) {
        difficultyLevel = newLevel;
        updateHUD();
    }
    
    // Boss 触发 (每 5000 分)
    let threshold = (bossIndex + 1) * 5000;
    if(score >= threshold && !bossMode) {
        bossMode = true;
        
        // 清场小敌机
        enemyPool.items.forEach(e => {
            if(e.active) { e.active = false; createExplosion(e.x, e.y, e.color, 5); }
        });
        
        document.getElementById('warningScreen').style.display = 'block';
        playSound('warning');
        setTimeout(() => {
            document.getElementById('warningScreen').style.display = 'none';
            boss.spawn(bossIndex);
        }, 3000);
    }
}

function updateHUD() {
    document.getElementById('scoreVal').innerText = score;
    document.getElementById('levelVal').innerText = difficultyLevel;
    document.getElementById('hpVal').innerText = Math.floor(player.hp);
    document.getElementById('powerVal').innerText = player.power;
}

// ==========================================
// 渲染与主循环
// ==========================================
let bgOffset = 0;
function drawBackground(dt) {
    ctx.fillStyle = 'rgba(5, 5, 16, 0.4)'; // 拖影效果
    ctx.fillRect(0, 0, W, H);
    
    // 透视网格
    bgOffset = (bgOffset + 100 * dt) % 50;
    ctx.strokeStyle = 'rgba(0, 255, 255, 0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    // 横线
    for(let y = bgOffset; y < H; y += 50) {
        ctx.moveTo(0, y); ctx.lineTo(W, y);
    }
    // 竖线 (透视)
    const centerX = W/2;
    for(let i = -10; i <= 10; i++) {
        let topX = centerX + i * 30;
        let bottomX = centerX + i * 150;
        ctx.moveTo(topX, 0); ctx.lineTo(bottomX, H);
    }
    ctx.stroke();
}

let lastTime = performance.now();
function gameLoop(now) {
    requestAnimationFrame(gameLoop);
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    if(dt > 0.1) dt = 0.1;

    if(gameState !== 'playing') return;

    drawBackground(dt);

    // 更新逻辑
    player.update(dt);
    spawnEnemies(dt);
    boss.update(dt);

    const pools = [bulletPool, particlePool, itemPool, enemyPool];
    pools.forEach(p => p.items.forEach(item => item.update(dt)));

    // 碰撞检测
    bulletPool.items.forEach(b => {
        if(!b.active) return;
        if(b.isPlayer) {
            // 击中敌人
            enemyPool.items.forEach(e => {
                if(e.active && Math.hypot(b.x - e.x, b.y - e.y) < e.radius + b.radius) {
                    b.active = false; e.takeDamage(b.dmg);
                    createExplosion(b.x, b.y, '#fff', 3);
                }
            });
            // 击中Boss
            if(boss.active && boss.state === 'attack' && Math.hypot(b.x - boss.x, b.y - boss.y) < 50) {
                b.active = false; boss.takeDamage(b.dmg);
                createExplosion(b.x, b.y, '#ff0', 3);
            }
        } else {
            // 击中玩家
            if(Math.hypot(b.x - player.x, b.y - player.y) < player.radius + b.radius) {
                b.active = false;
                player.hp -= b.dmg;
                player.power = Math.max(1, player.power - 1);
                playSound('hit');
                createExplosion(player.x, player.y, '#f00', 5);
                updateHUD();
                if(player.hp <= 0) gameOver();
            }
        }
    });

    // 敌机撞击玩家
    enemyPool.items.forEach(e => {
        if(e.active && Math.hypot(e.x - player.x, e.y - player.y) < e.radius + player.radius) {
            e.active = false;
            player.hp -= 20;
            createExplosion(e.x, e.y, e.color, 10);
            updateHUD();
            if(player.hp <= 0) gameOver();
        }
    });

    // Boss撞击玩家
    if(boss.active && Math.hypot(boss.x - player.x, boss.y - player.y) < 50 + player.radius) {
         player.hp -= 1 * dt * 60; // 持续接触伤害
         updateHUD();
         if(player.hp <= 0) gameOver();
    }

    // 渲染
    pools.forEach(p => p.items.forEach(item => item.draw(ctx)));
    boss.draw(ctx);
    player.draw(ctx);
    updateHUD();
}

function gameOver() {
    gameState = 'gameover';
    document.getElementById('finalScore').innerText = score;
    document.getElementById('gameOverMenu').style.display = 'flex';
}

function initGame() {
    score = 0; difficultyLevel = 1; bossMode = false; bossIndex = 0;
    player.reset();
    [bulletPool, particlePool, itemPool, enemyPool].forEach(p => p.items.forEach(i => i.active = false));
    boss.active = false;
    updateHUD();
}

// 启动
initGame();
requestAnimationFrame(gameLoop);

</script>
