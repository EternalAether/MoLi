<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>怀旧掌机俄罗斯方块音效合成器 | 经典GameBoy风格</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1a3c2c 0%, #0e2a1c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', 'Monaco', monospace;
            padding: 20px;
            margin: 0;
        }

        /* 掌机风格主容器 */
        .gameboy {
            background: #2b2b2b;
            border-radius: 50px 50px 60px 60px;
            padding: 25px 20px 30px 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.1);
            border-bottom: 6px solid #1a1a1a;
        }

        /* 屏幕区域 */
        .screen {
            background: #1e2a1a;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 0 3px #0f0f0a, inset 0 0 0 6px #3a4a2e, 0 8px 12px rgba(0,0,0,0.3);
        }

        .screen-header {
            text-align: center;
            color: #8bb56a;
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 3px #3f6b2f;
            margin-bottom: 8px;
        }

        .visualizer {
            background: #0c1a0a;
            height: 80px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: inset 0 0 6px #000000;
            color: #9fcc7a;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            flex-wrap: wrap;
            padding: 8px;
        }

        .led {
            width: 12px;
            height: 12px;
            background: #5f8b3e;
            border-radius: 50%;
            box-shadow: 0 0 4px #86bf4e;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* 按钮面板 */
        .buttons-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 16px 12px;
            margin-top: 10px;
        }

        /* 复古按键样式 */
        .retro-btn {
            background: #3f3f46;
            border: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 12px 8px;
            border-radius: 40px;
            color: #f0f0e0;
            text-shadow: 0 1px 0 #1a1a1a;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.05s linear;
            box-shadow: 0 5px 0 #1a1a1a, 0 2px 12px rgba(0,0,0,0.3);
            background: linear-gradient(145deg, #50505a, #35353d);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .retro-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1a1a1a;
        }

        /* 特殊颜色分组 */
        .action-btn {
            background: linear-gradient(145deg, #6b4c3b, #4e3527);
            box-shadow: 0 5px 0 #2f211b;
        }

        .clear-btn {
            background: linear-gradient(145deg, #3f6b3a, #2c4a27);
            box-shadow: 0 5px 0 #1d3219;
        }

        .special-btn {
            background: linear-gradient(145deg, #5f4c6b, #3e2e47);
            box-shadow: 0 5px 0 #292035;
        }

        .badge {
            font-size: 1.2rem;
            filter: drop-shadow(0 1px 1px black);
        }

        /* 行数选择微调 */
        .line-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 18px;
            background: #23232380;
            padding: 8px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        .line-chip {
            background: #1f2c1b;
            padding: 6px 14px;
            border-radius: 40px;
            color: #b7e48b;
            font-weight: bold;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .line-chip span {
            background: #00000060;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 18px;
            color: #f5c542;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #6e8f5a;
            font-family: monospace;
        }

        @media (max-width: 560px) {
            .retro-btn {
                font-size: 0.8rem;
                padding: 10px 5px;
            }
            .badge {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="gameboy">
    <div class="screen">
        <div class="screen-header">
            🎮 TETRIS SOUND SYNTHESIZER 🎵
        </div>
        <div class="visualizer">
            <div class="led"></div>
            <span>◆ 经典脉冲波 ◆</span>
            <div class="led"></div>
        </div>
    </div>

    <!-- 消除行快捷选择提示 -->
    <div class="line-selector">
        <div class="line-chip">🧱 消除行数效果 <span id="lineCountDemo">1</span> 行</div>
    </div>

    <div class="buttons-panel">
        <button class="retro-btn action-btn" id="moveBtn">◀ 移动</button>
        <button class="retro-btn action-btn" id="rotateBtn">↻ 旋转</button>
        <button class="retro-btn action-btn" id="dropBtn">▼ 硬降/放置</button>
        <button class="retro-btn clear-btn" id="clear1Btn">▣ 消除 1行</button>
        <button class="retro-btn clear-btn" id="clear2Btn">▣▣ 消除 2行</button>
        <button class="retro-btn clear-btn" id="clear3Btn">▣▣▣ 消除 3行</button>
        <button class="retro-btn clear-btn" id="clear4Btn">✨ 消除 4行 (TETRIS)</button>
        <button class="retro-btn special-btn" id="levelUpBtn">⭐ 等级提升</button>
        <button class="retro-btn special-btn" id="gameOverBtn">💀 GAME OVER</button>
    </div>
    <footer>
        ⚡ 点击按钮触发复古音效 | 基于Web Audio合成 (经典GB风格)
    </footer>
</div>

<script>
    (function() {
        // ---------- 初始化 AudioContext (挂起状态，等待用户手势) ----------
        let audioCtx = null;
        // 确保只初始化一次
        if (typeof window.AudioContext !== 'undefined' || typeof window.webkitAudioContext !== 'undefined') {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } else {
            alert("您的浏览器不支持Web Audio API，无法体验合成音效。");
        }

        // 全局标志防止重复启用日志
        let isAudioReady = false;

        // 通用播放核心: 单个短音 (支持频率、时长、音量、波形类型、滑音可选)
        // 返回Promise，便于序列播放
        function playTone(frequency, durationSec = 0.12, volume = 0.25, waveType = 'square', fadeOut = true) {
            return new Promise((resolve) => {
                if (!audioCtx) {
                    resolve();
                    return;
                }
                // 确保音频上下文处于运行状态（用户手势触发后才会运行）
                const ensureRunning = () => {
                    if (audioCtx.state === 'running') {
                        return Promise.resolve();
                    } else if (audioCtx.state === 'suspended') {
                        return audioCtx.resume();
                    }
                    return Promise.resolve();
                };

                ensureRunning().then(() => {
                    const now = audioCtx.currentTime;
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    oscillator.type = waveType;
                    oscillator.frequency.value = frequency;
                    
                    gainNode.gain.setValueAtTime(volume, now);
                    if (fadeOut) {
                        // 指数衰减，模仿老式掌机短促收尾
                        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);
                    } else {
                        gainNode.gain.setValueAtTime(volume, now);
                        gainNode.gain.setValueAtTime(volume, now + durationSec * 0.9);
                        gainNode.gain.linearRampToValueAtTime(0, now + durationSec);
                    }
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    oscillator.start();
                    oscillator.stop(now + durationSec);
                    
                    // 清理节点并resolve
                    oscillator.onended = () => {
                        oscillator.disconnect();
                        gainNode.disconnect();
                        resolve();
                    };
                    // 超时保护
                    setTimeout(() => resolve(), durationSec * 1000 + 50);
                }).catch(e => {
                    console.warn("音频播放错误:", e);
                    resolve();
                });
            });
        }

        // 播放序列 (依次播放一组频率和时长)
        async function playSequence(notes, defaultDuration = 0.1, volume = 0.22, wave = 'square') {
            for (let i = 0; i < notes.length; i++) {
                const freq = notes[i];
                const duration = (Array.isArray(defaultDuration) && defaultDuration[i]) ? defaultDuration[i] : defaultDuration;
                await playTone(freq, duration, volume, wave);
                // 短间隔，让每个音符清晰
                await new Promise(r => setTimeout(r, 25));
            }
        }

        // ---------- 以下定义各经典俄罗斯方块音效 (基于掌机记忆) ----------
        
        // 1. 移动音效: 短促清脆高频 "嘀"
        function playMoveSound() {
            playTone(1350, 0.06, 0.18, 'square', true);
        }
        
        // 2. 旋转音效: 稍高更锐利一点
        function playRotateSound() {
            playTone(1520, 0.055, 0.2, 'square', true);
        }
        
        // 3. 下落/放置音效: 低沉的“噗” (掌机方块落地感)
        function playDropSound() {
            playTone(210, 0.13, 0.28, 'sawtooth', true);
        }
        
        // 4. 消除行音效 (根据行数不同，经典上升音阶/短琶音)
        // 消除一行: 短促单音 (C5)
        function playClearLine(lines = 1) {
            switch(lines) {
                case 1:
                    playTone(523.25, 0.12, 0.28, 'square', true);  // C5 干净
                    break;
                case 2:
                    // 二连升调: C5 -> E5
                    playSequence([523.25, 659.25], 0.1, 0.27, 'square');
                    break;
                case 3:
                    // 三连音: C5 - E5 - G5
                    playSequence([523.25, 659.25, 783.99], 0.1, 0.27, 'square');
                    break;
                case 4:
                    // 经典四行(Tetris) 胜利小旋律: C5, E5, G5, C6 (高八度)
                    playSequence([523.25, 659.25, 783.99, 1046.50], [0.1, 0.1, 0.12, 0.2], 0.32, 'square');
                    break;
                default:
                    playTone(523.25, 0.1, 0.25, 'square');
            }
        }
        
        // 等级提升 (level up) 欢快上升音阶: 类似游戏奖励音效
        function playLevelUp() {
            playSequence([523.25, 659.25, 783.99, 1046.50], [0.12, 0.12, 0.14, 0.25], 0.3, 'square');
        }
        
        // Game Over 经典下降音阶 + 低音收尾 (沉重)
        function playGameOver() {
            // 先快速下滑三连音
            playSequence([880, 698.46, 523.25, 392.00], [0.18, 0.16, 0.2, 0.35], 0.32, 'sawtooth').then(() => {
                // 最后加一个低沉“嗡”收尾
                playTone(196.00, 0.5, 0.22, 'sine', true);
            });
        }
        
        // 额外: 开始音效(可选，增加趣味但非必要，但为了完整也可以挂一个彩蛋)
        function playStartSound() {
            playSequence([659.25, 523.25, 783.99, 1046.50], [0.1, 0.1, 0.12, 0.3], 0.28, 'square');
        }

        // ---------- UI 交互与反馈 + 音频自动唤醒 ----------
        // 唤醒音频上下文 (保证所有按钮触发时音频激活)
        let audioActivated = false;
        function activateAudioContext() {
            if (audioCtx && audioCtx.state !== 'running') {
                audioCtx.resume().then(() => {
                    console.log("音频引擎已启动 — 怀旧音效就绪");
                    // 可选播放一个小提示音表明激活（也可忽略）
                    if (!audioActivated) {
                        audioActivated = true;
                        // 轻点反馈：短促的“嘀” 表示激活
                        playTone(880, 0.05, 0.12, 'square', true);
                    }
                }).catch(e => console.warn("自动唤醒失败，需用户手势", e));
            } else if (audioCtx && audioCtx.state === 'running') {
                audioActivated = true;
            }
        }

        // 包装所有音效，确保每次触发前尝试激活音频 (由于所有按钮均为用户点击，安全)
        function safePlay(fn) {
            return (...args) => {
                if (!audioCtx) {
                    console.warn("不支持Web Audio");
                    return;
                }
                // 如果未激活或挂起，先resume再播放 (手势触发是实时的)
                if (audioCtx.state !== 'running') {
                    audioCtx.resume().then(() => {
                        fn(...args);
                    }).catch(e => console.log("音频等待手势", e));
                } else {
                    fn(...args);
                }
            };
        }
        
        // 绑定各个按钮，采用安全播放器
        const moveBtn = document.getElementById('moveBtn');
        const rotateBtn = document.getElementById('rotateBtn');
        const dropBtn = document.getElementById('dropBtn');
        const clear1Btn = document.getElementById('clear1Btn');
        const clear2Btn = document.getElementById('clear2Btn');
        const clear3Btn = document.getElementById('clear3Btn');
        const clear4Btn = document.getElementById('clear4Btn');
        const levelUpBtn = document.getElementById('levelUpBtn');
        const gameOverBtn = document.getElementById('gameOverBtn');
        const lineCountDemoSpan = document.getElementById('lineCountDemo');
        
        if (moveBtn) moveBtn.addEventListener('click', safePlay(playMoveSound));
        if (rotateBtn) rotateBtn.addEventListener('click', safePlay(playRotateSound));
        if (dropBtn) dropBtn.addEventListener('click', safePlay(playDropSound));
        if (clear1Btn) clear1Btn.addEventListener('click', () => {
            safePlay(playClearLine)(1);
            if (lineCountDemoSpan) lineCountDemoSpan.innerText = '1';
        });
        if (clear2Btn) clear2Btn.addEventListener('click', () => {
            safePlay(playClearLine)(2);
            if (lineCountDemoSpan) lineCountDemoSpan.innerText = '2';
        });
        if (clear3Btn) clear3Btn.addEventListener('click', () => {
            safePlay(playClearLine)(3);
            if (lineCountDemoSpan) lineCountDemoSpan.innerText = '3';
        });
        if (clear4Btn) clear4Btn.addEventListener('click', () => {
            safePlay(playClearLine)(4);
            if (lineCountDemoSpan) lineCountDemoSpan.innerText = '4 ★';
            setTimeout(() => { if(lineCountDemoSpan) lineCountDemoSpan.innerText = '1'; }, 800);
        });
        if (levelUpBtn) levelUpBtn.addEventListener('click', safePlay(playLevelUp));
        if (gameOverBtn) gameOverBtn.addEventListener('click', safePlay(playGameOver));
        
        // 为了更复古, 增加键盘快捷键支持 (可选，提升体验但非必要，这里锦上添花)
        // 映射: 方向键左->移动，上/右->旋转，下->硬降, L键清1行，K等级，O game over 等
        window.addEventListener('keydown', (e) => {
            // 防止页面滚动
            const key = e.key;
            // 仅当没有输入框焦点时触发，增强怀旧感
            if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
            switch(key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    safePlay(playMoveSound)();
                    break;
                case 'ArrowUp':
                case 'ArrowRight':
                    e.preventDefault();
                    safePlay(playRotateSound)();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    safePlay(playDropSound)();
                    break;
                case '1':
                    safePlay(playClearLine)(1);
                    if(lineCountDemoSpan) lineCountDemoSpan.innerText = '1';
                    e.preventDefault();
                    break;
                case '2':
                    safePlay(playClearLine)(2);
                    if(lineCountDemoSpan) lineCountDemoSpan.innerText = '2';
                    e.preventDefault();
                    break;
                case '3':
                    safePlay(playClearLine)(3);
                    if(lineCountDemoSpan) lineCountDemoSpan.innerText = '3';
                    e.preventDefault();
                    break;
                case '4':
                    safePlay(playClearLine)(4);
                    if(lineCountDemoSpan) lineCountDemoSpan.innerText = '4 ★';
                    setTimeout(() => { if(lineCountDemoSpan) lineCountDemoSpan.innerText = '1'; }, 800);
                    e.preventDefault();
                    break;
                case 'l':
                case 'L':
                    safePlay(playLevelUp)();
                    e.preventDefault();
                    break;
                case 'g':
                case 'G':
                    safePlay(playGameOver)();
                    e.preventDefault();
                    break;
                case 's':
                case 'S':
                    safePlay(playStartSound)();
                    e.preventDefault();
                    break;
                default: break;
            }
        });
        
        // 为了让页面任意点击也能预先激活音频（用户首次点击任何按钮就已经激活）
        // 额外在页面加载后增加一个轻提示（不需要自动播放，只通过用户首次点击唤醒）
        // 显示一条启动引导的微提醒
        const stylePrompt = document.createElement('div');
        stylePrompt.style.position = 'fixed';
        stylePrompt.style.bottom = '10px';
        stylePrompt.style.left = '10px';
        stylePrompt.style.backgroundColor = '#000000aa';
        stylePrompt.style.color = '#b3ff9b';
        stylePrompt.style.fontSize = '11px';
        stylePrompt.style.padding = '4px 10px';
        stylePrompt.style.borderRadius = '20px';
        stylePrompt.style.fontFamily = 'monospace';
        stylePrompt.style.backdropFilter = 'blur(4px)';
        stylePrompt.style.zIndex = '999';
        stylePrompt.innerText = '🎧 点击任意按钮 → 启动8bit音效 | 键盘: ←移动 ↑旋转 ↓硬降 1-4行消除 L等级 G结束';
        document.body.appendChild(stylePrompt);
        setTimeout(() => {
            stylePrompt.style.opacity = '0.7';
            setTimeout(() => {
                if(stylePrompt) stylePrompt.style.transition = 'opacity 1s';
                setTimeout(() => { if(stylePrompt) stylePrompt.style.opacity = '0.3'; }, 4000);
            }, 2000);
        }, 1000);
        
        // 主动检测，如果用户点击页面任意位置（包含按钮）激活音频上下文，保证体验
        function globalActivateHandler() {
            if (audioCtx && audioCtx.state !== 'running') {
                audioCtx.resume().then(() => {
                    console.log("音频全局激活");
                }).catch(e=>{});
            }
            // 一次性移除多个监听避免浪费，但保留一个温和唤醒
            document.body.removeEventListener('touchstart', globalActivateHandler);
            document.body.removeEventListener('mousedown', globalActivateHandler);
        }
        document.body.addEventListener('touchstart', globalActivateHandler);
        document.body.addEventListener('mousedown', globalActivateHandler);
        
        // 额外特效: 按键时候给视觉反馈 (掌机按钮动画)
        const allBtns = document.querySelectorAll('.retro-btn');
        allBtns.forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'translateY(3px)';
                btn.style.boxShadow = '0 1px 0 #1a1a1a';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = '';
                btn.style.boxShadow = '';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = '';
                btn.style.boxShadow = '';
            });
            // 触摸端兼容
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'translateY(3px)';
                btn.style.boxShadow = '0 1px 0 #1a1a1a';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = '';
                btn.style.boxShadow = '';
            });
        });
        
        // 预置一段欢迎彩蛋：如果用户点击屏幕标题区三次播放经典旋律（趣味）
        const screenDiv = document.querySelector('.screen');
        let clickCount = 0;
        screenDiv.addEventListener('click', (e) => {
            if(e.target.closest('.retro-btn')) return;
            clickCount++;
            if(clickCount === 3) {
                safePlay(playStartSound)();
                clickCount = 0;
                const ledHint = document.querySelector('.led');
                if(ledHint) {
                    ledHint.style.animation = 'none';
                    setTimeout(() => { if(ledHint) ledHint.style.animation = 'pulse 1.5s infinite'; }, 100);
                }
            } else {
                setTimeout(() => { clickCount = 0; }, 1500);
            }
        });
        
        // 显示控制台友好的提示
        console.log("✅ 怀旧掌机俄罗斯方块音效合成器已加载 | 使用按钮或键盘(←移动, ↑旋转, ↓硬降, 1~4消除行, L等级提升, G游戏结束)");
    })();
</script>
</body>
</html>
